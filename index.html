<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registration Form</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">

    <div class="form-card">

      <h1>Registration Form</h1>
      <p class="subtitle">
        Complete the form below to register.
      </p>

      <form id="registrationForm" enctype="multipart/form-data">

        <!-- Name -->
        <div class="form-group">
          <label for="name">Full Name</label>
          <input
            type="text"
            id="name"
            name="name"
            placeholder="Enter your full name"
            required
          >
        </div>

        <!-- Email -->
        <div class="form-group">
          <label for="email">Email Address</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="example@email.com"
            required
          >
          <small id="emailMessage"></small>
        </div>

        <!-- Age -->
        <div class="form-group">
          <label for="age">Age</label>
          <input
            type="number"
            id="age"
            name="age"
            min="1"
            max="100"
          >
        </div>

        <!-- Date -->
        <div class="form-group">
          <label for="dob">Date of Birth</label>
          <input
            type="date"
            id="dob"
            name="dob"
          >
        </div>

        <!-- Favourite Food -->
        <div class="form-group">

          <label>Favourite Food</label>

          <div class="checkbox-group">

            <label>
              <input type="checkbox" name="food" value="Rice">
              Rice
            </label>

            <label>
              <input type="checkbox" name="food" value="Beans">
              Beans
            </label>

            <label>
              <input type="checkbox" name="food" value="Potatoes">
              Potatoes
            </label>

            <label>
              <input type="checkbox" name="food" value="Spaghetti">
              Spaghetti
            </label>

          </div>

          <input
            type="text"
            id="otherFood"
            name="otherFood"
            placeholder="Other favourite food"
          >

        </div>

        <!-- Gender -->
        <div class="form-group">

          <label>Gender</label>

          <div class="radio-group">

            <label>
              <input
                type="radio"
                name="gender"
                value="Female"
                required
              >
              Female
            </label>

            <label>
              <input
                type="radio"
                name="gender"
                value="Male"
              >
              Male
            </label>

            <label>
              <input
                type="radio"
                name="gender"
                value="Other"
              >
              Other
            </label>

          </div>

        </div>

        <!-- Eye Colour -->
        <div class="form-group">

          <label for="eyeColour">Eye Colour</label>

          <select id="eyeColour" name="eyeColour">

            <option value="">Select</option>

            <option value="Brown">Brown</option>

            <option value="Black">Black</option>

            <option value="Blue">Blue</option>

            <option value="Green">Green</option>

            <option value="Grey">Grey</option>

          </select>

        </div>

        <!-- Bio -->
        <div class="form-group">

          <label for="bio">Short Bio</label>

          <textarea
            id="bio"
            name="bio"
            rows="5"
            maxlength="300"
            placeholder="Tell us about yourself..."
          ></textarea>

          <div class="character-counter">
            <span id="bioCount">0</span>/300
          </div>

        </div>

        <!-- Upload -->
        <div class="form-group">

          <label for="file">Upload Document</label>

          <input
            type="file"
            id="file"
            name="file"
          >

          <small id="fileName"></small>

        </div>

        <!-- Phone -->
        <div class="form-group">

          <label for="phone">Phone Number</label>

          <input
            type="tel"
            id="phone"
            name="phone"
            placeholder="+34 612345678"
          >

        </div>

        <!-- LinkedIn -->
        <div class="form-group">

          <label for="linkedin">LinkedIn Profile</label>

          <input
            type="url"
            id="linkedin"
            name="linkedin"
            placeholder="https://linkedin.com/in/username"
          >

        </div>

        <!-- Favourite Colour -->
        <div class="form-group">

          <label for="color">Favourite Colour</label>

          <input
            type="color"
            id="color"
            name="color"
            value="#7B2CBF"
          >

        </div>

        <!-- Hidden -->
        <input
          type="hidden"
          name="hidden"
          value="Hello"
        >

        <!-- Password -->
        <div class="form-group">

          <label for="password">Password</label>

          <input
            type="password"
            id="password"
            name="password"
            placeholder="Create a password"
            required
          >

          <div id="passwordStrength" class="password-strength"></div>

        </div>

        <!-- Buttons -->

        <div class="button-group">

          <button type="reset" class="reset-btn">
            Reset
          </button>

          <button type="submit" class="submit-btn">
            Submit
          </button>

        </div>

      </form>

    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
